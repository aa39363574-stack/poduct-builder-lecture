<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로또 번호 추천 (5세트)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 60px;
            font-size: 21px;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .container {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode .container {
            background: #34495e;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 37px;
        }

        button {
            margin: 20px 0;
            padding: 15px 30px;
            font-size: 21px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .theme-toggle {
            margin-bottom: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        body.dark-mode .theme-toggle {
            background-color: #7f8c8d;
        }

        .set {
            margin: 15px 0;
        }

        .ball {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            margin: 5px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 21px;
        }

        /* 번호 구간별 색상 */
        .yellow { background-color: #f1c40f; }
        .blue   { background-color: #3498db; }
        .red    { background-color: #e74c3c; }
        .gray   { background-color: #7f8c8d; }
        .green  { background-color: #2ecc71; }

    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">다크/라이트 모드 전환</button>
    <h1>🎰 로또 번호 추천기</h1>
    <p>버튼을 누르면 로또 번호 5세트를 추천합니다</p>
    <button onclick="generateAll()">로또 번호 추천</button>

    <div id="result"></div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function generateLottoSet() {
        let numbers = [];
        while (numbers.length < 6) {
            let num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        return numbers.sort((a, b) => a - b);
    }

    function getColorClass(num) {
        if (num <= 10) return "yellow";
        if (num <= 20) return "blue";
        if (num <= 30) return "red";
        if (num <= 40) return "gray";
        return "green";
    }

    function generateAll() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "";

        for (let i = 1; i <= 5; i++) {
            const setDiv = document.createElement("div");
            setDiv.className = "set";
            setDiv.innerHTML = `<strong>${i}세트</strong><br>`;

            const numbers = generateLottoSet();

            numbers.forEach(num => {
                const ball = document.createElement("div");
                ball.className = `ball ${getColorClass(num)}`;
                ball.innerText = num;
                setDiv.appendChild(ball);
            });

            resultDiv.appendChild(setDiv);
        }
    }
</script>

</body>
</html>
